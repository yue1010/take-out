spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/takeout?serverTimezone=Asia/Shanghai
    username: root
    password: 123456

  mybatis:
    configuration:
      map-underscore-to-camel-case: true
      mybatis-plus:
        # 扫描 resources/mapper 下的所有 XML 文件
        mapper-locations: classpath:mapper/*.xml
        # 开启驼峰命名映射（可选，建议添加）
        configuration:
          map-underscore-to-camel-case: true
# MyBatis 配置（适配注解版Mapper，删除无效的mapper-locations）
mybatis:
  configuration:
    map-underscore-to-camel-case: true  # 下划线转驼峰（保留）
    auto-mapping-behavior: FULL         # 新增：强制自动映射所有字段
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 新增：打印SQL日志（关键！）
  type-aliases-package: com.itheima.pojo  # 保留（可选）